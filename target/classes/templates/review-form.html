<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写点评 - 校园美食汇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shop"></i> 校园美食汇</a>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0"><i class="bi bi-pencil-square"></i> 写点评</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-4 p-3 bg-light rounded">
                            <h5 th:text="${shop.name}">店铺名</h5>
                            <p class="text-muted mb-0" th:text="${shop.location}">位置</p>
                        </div>
                        <form th:action="@{/review/create}" method="post" enctype="multipart/form-data">
                            <input type="hidden" name="shopId" th:value="${shop.id}">

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-star-fill text-warning"></i> 评分</label>
                                <div class="rating-stars">
                                    <div class="btn-group" role="group">
                                        <label class="btn btn-outline-warning" th:each="r : ${ratings}">
                                            <input type="radio" name="rating" th:value="${r}" class="btn-check" th:checked="${r == 5}">
                                            <span th:text="${r} + ' 星'">5 星</span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-chat-dots"></i> 点评内容</label>
                                <textarea name="content" class="form-control" rows="5" placeholder="分享你的用餐体验..." required></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-image"></i> 上传图片（可选）</label>
                                <input type="file" name="image" class="form-control" accept="image/*">
                                <div class="form-text">支持 JPG、PNG 格式，单张不超过 10MB</div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/shops/{id}(id=${shop.id})}" class="btn btn-secondary">取消</a>
                                <button type="submit" class="btn btn-success"><i class="bi bi-send"></i> 提交点评</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
