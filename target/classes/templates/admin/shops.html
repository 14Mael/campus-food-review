<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店铺管理 - 校园美食汇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/admin"><i class="bi bi-gear"></i> 管理后台</a>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm me-2">前台首页</a>
                <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <div class="row">
            <div class="col-md-2 mb-4">
                <div class="list-group shadow-sm">
                    <a href="/admin" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2"></i> 控制台</a>
                    <a href="/admin/shops" class="list-group-item list-group-item-action active"><i class="bi bi-shop"></i> 店铺管理</a>
                    <a href="/admin/reviews" class="list-group-item list-group-item-action"><i class="bi bi-chat-dots"></i> 评论审核</a>
                    <a href="/admin/users" class="list-group-item list-group-item-action"><i class="bi bi-people"></i> 用户管理</a>
                </div>
            </div>
            <div class="col-md-10">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white d-flex justify-content-between">
                        <h5 class="mb-0"><i class="bi bi-shop"></i> 店铺管理</h5>
                        <a href="/admin/shops/new" class="btn btn-success btn-sm"><i class="bi bi-plus-circle"></i> 添加店铺</a>
                    </div>
                    <div class="card-body">
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>名称</th>
                                    <th>位置</th>
                                    <th>分类</th>
                                    <th>评分</th>
                                    <th>点评数</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="shop : ${shops}">
                                    <td th:text="${shop.id}">1</td>
                                    <td><strong th:text="${shop.name}">店铺名</strong></td>
                                    <td class="text-muted" th:text="${shop.location}">位置</td>
                                    <td><span class="badge bg-success" th:text="${shop.category}">分类</span></td>
                                    <td><span class="badge bg-warning text-dark"><i class="bi bi-star-fill"></i> <span th:text="${shop.avgRating}">0.0</span></span></td>
                                    <td th:text="${shop.reviewCount}">0</td>
                                    <td>
                                        <a th:href="@{/admin/shops/edit/{id}(id=${shop.id})}" class="btn btn-sm btn-primary"><i class="bi bi-pencil"></i> 编辑</a>
                                        <a th:href="@{/admin/shops/{shopId}/menus(shopId=${shop.id})}" class="btn btn-sm btn-info"><i class="bi bi-menu-app"></i> 菜单</a>
                                        <a th:href="@{/admin/shops/delete/{id}(id=${shop.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除该店铺？')"><i class="bi bi-trash"></i> 删除</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <!-- Pagination -->
                        <nav th:if="${totalPages > 1}">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/shops(page=${currentPage - 1})}">上一页</a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/admin/shops(page=${i})}" th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/shops(page=${currentPage + 1})}">下一页</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
