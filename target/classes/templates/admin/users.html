<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 校园美食汇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/admin"><i class="bi bi-gear"></i> 管理后台</a>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm me-2">前台首页</a>
                <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <div class="row">
            <div class="col-md-2 mb-4">
                <div class="list-group shadow-sm">
                    <a href="/admin" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2"></i> 控制台</a>
                    <a href="/admin/shops" class="list-group-item list-group-item-action"><i class="bi bi-shop"></i> 店铺管理</a>
                    <a href="/admin/reviews" class="list-group-item list-group-item-action"><i class="bi bi-chat-dots"></i> 评论审核</a>
                    <a href="/admin/users" class="list-group-item list-group-item-action active"><i class="bi bi-people"></i> 用户管理</a>
                </div>
            </div>
            <div class="col-md-10">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0"><i class="bi bi-people"></i> 用户列表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>用户名</th>
                                        <th>昵称</th>
                                        <th>角色</th>
                                        <th>状态</th>
                                        <th>注册时间</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="u : ${users}">
                                        <td th:text="${u.id}">1</td>
                                        <td><strong th:text="${u.username}">用户名</strong></td>
                                        <td th:text="${u.nickname}">昵称</td>
                                        <td>
                                            <span class="badge" th:classappend="${u.role.name() == 'ADMIN'} ? 'bg-danger' : 'bg-primary'"
                                                  th:text="${u.role.name() == 'ADMIN'} ? '管理员' : '用户'">角色</span>
                                        </td>
                                        <td>
                                            <span class="badge" th:classappend="${u.enabled} ? 'bg-success' : 'bg-secondary'"
                                                  th:text="${u.enabled} ? '正常' : '禁用'">状态</span>
                                        </td>
                                        <td class="text-muted" th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd')}">日期</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
