server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 30m

spring:
  datasource:
    url: jdbc:h2:mem:campusfood;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: true
  thymeleaf:
    cache: false
    suffix: .html
    encoding: UTF-8
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# File upload path
app:
  upload:
    path: ${user.dir}/uploads/
  admin:
    default-username: admin
    default-password: admin123

logging:
  level:
    com.campus: debug
    org.springframework.security: info
