<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部店铺 - 校园美食汇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar (same as index) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shop"></i> 校园美食汇</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/shops"><i class="bi bi-list"></i> 全部店铺</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login"><i class="bi bi-box-arrow-in-right"></i> 登录</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/register"><i class="bi bi-person-plus"></i> 注册</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span sec:authentication="name">用户</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/user/profile"><i class="bi bi-person"></i> 个人中心</a></li>
                            <li><a class="dropdown-item" href="/shops"><i class="bi bi-search"></i> 浏览店铺</a></li>
                            <li sec:authorize="hasRole('ADMIN')"><hr class="dropdown-divider"></li>
                            <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item text-success" href="/admin"><i class="bi bi-gear"></i> 管理后台</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/logout"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <!-- Search & Filter Bar -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form action="/shops" method="get" class="row g-2">
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" name="keyword" class="form-control" placeholder="搜索店铺名称..." th:value="${keyword}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select name="category" class="form-select">
                            <option value="">全部分类</option>
                            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}" th:selected="${category == cat}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select name="sort" class="form-select">
                            <option value="latest" th:selected="${sort == 'latest'}">最新</option>
                            <option value="rating" th:selected="${sort == 'rating'}">评分最高</option>
                            <option value="reviews" th:selected="${sort == 'reviews'}">最多点评</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100">筛选</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Shop Grid -->
        <div th:if="${#lists.isEmpty(shops)}" class="text-center py-5">
            <i class="bi bi-inbox display-1 text-muted"></i>
            <p class="text-muted mt-3">暂无店铺信息</p>
        </div>
        <div class="row g-4" th:unless="${#lists.isEmpty(shops)}">
            <div class="col-md-6 col-lg-4 col-xl-3" th:each="shop : ${shops}">
                <div class="card h-100 shadow-sm shop-card">
                    <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height:160px;">
                        <img th:if="${shop.image != null}" th:src="${shop.image}" class="h-100 w-100" style="object-fit:cover;" alt="店铺图片">
                        <i th:unless="${shop.image != null}" class="bi bi-shop display-1 text-muted"></i>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title" th:text="${shop.name}">店铺名</h5>
                        <p class="card-text text-muted small" th:text="${shop.location}">位置</p>
                        <p class="card-text text-muted small">
                            <span class="badge bg-success me-1" th:text="${shop.category}">分类</span>
                        </p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-warning text-dark">
                                <i class="bi bi-star-fill"></i> <span th:text="${shop.avgRating}">0.0</span>
                            </span>
                            <small class="text-muted"><i class="bi bi-chat-dots"></i> <span th:text="${shop.reviewCount}">0</span></small>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0">
                        <a th:href="@{/shops/{id}(id=${shop.id})}" class="btn btn-outline-success w-100">查看详情</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/shops(page=${currentPage - 1}, sort=${sort}, category=${category}, keyword=${keyword})}">上一页</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/shops(page=${i}, sort=${sort}, category=${category}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/shops(page=${currentPage + 1}, sort=${sort}, category=${category}, keyword=${keyword})}">下一页</a>
                </li>
            </ul>
        </nav>
    </div>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1"><i class="bi bi-shop"></i> 校园美食汇</p>
            <p class="mb-0 small text-muted">发现校园美食，分享舌尖体验</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
