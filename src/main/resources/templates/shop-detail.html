<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${shop.name} + ' - 校园美食汇'">店铺详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shop"></i> 校园美食汇</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/shops"><i class="bi bi-list"></i> 全部店铺</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login"><i class="bi bi-box-arrow-in-right"></i> 登录</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/register"><i class="bi bi-person-plus"></i> 注册</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span sec:authentication="name">用户</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/user/profile"><i class="bi bi-person"></i> 个人中心</a></li>
                            <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item text-success" href="/admin"><i class="bi bi-gear"></i> 管理后台</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/logout"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Shop Header -->
        <div class="card shadow-sm mb-4">
            <div class="row g-0">
                <div class="col-md-4">
                    <div class="bg-light d-flex align-items-center justify-content-center h-100" style="min-height:250px;">
                        <img th:if="${shop.image != null}" th:src="${shop.image}" class="w-100 h-100" style="object-fit:cover;" alt="店铺图片">
                        <i th:unless="${shop.image != null}" class="bi bi-shop display-1 text-muted"></i>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <h2 class="card-title" th:text="${shop.name}">店铺名</h2>
                            <div sec:authorize="isAuthenticated()">
                                <form action="/favorite/{shopId}/toggle-web" th:action="@{/favorite/{id}/toggle-web(id=${shop.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn" th:classappend="${isFavorited} ? 'btn-danger' : 'btn-outline-danger'">
                                        <i class="bi" th:classappend="${isFavorited} ? 'bi-heart-fill' : 'bi-heart'"></i>
                                        <span th:text="${favoriteCount}">0</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                        <p class="text-muted" th:text="${shop.location}">位置</p>
                        <p th:text="${shop.description}">描述</p>
                        <div class="mb-2">
                            <span class="badge bg-success me-2" th:text="${shop.category}">分类</span>
                            <span class="badge bg-warning text-dark me-2">
                                <i class="bi bi-star-fill"></i> <span th:text="${shop.avgRating}">0.0</span>
                            </span>
                            <span class="badge bg-info">
                                <i class="bi bi-chat-dots"></i> <span th:text="${shop.reviewCount}">0</span> 条点评
                            </span>
                        </div>
                        <div sec:authorize="isAuthenticated()">
                            <a th:href="@{/review/new(shopId=${shop.id})}" class="btn btn-success mt-2">
                                <i class="bi bi-pencil-square"></i> 写点评
                            </a>
                        </div>
                        <div sec:authorize="!isAuthenticated()" class="mt-2">
                            <a href="/login" class="btn btn-outline-success">登录后写点评</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Menu Section -->
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="bi bi-menu-app"></i> 推荐菜品</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(menuItems)}" class="text-center py-3">
                            <p class="text-muted mb-0">暂无菜品信息</p>
                        </div>
                        <ul class="list-group list-group-flush" th:unless="${#lists.isEmpty(menuItems)}">
                            <li class="list-group-item d-flex justify-content-between align-items-center" th:each="item : ${menuItems}">
                                <div>
                                    <strong th:text="${item.name}">菜品名</strong>
                                    <small class="d-block text-muted" th:text="${item.description}">描述</small>
                                </div>
                                <span class="badge bg-success rounded-pill" th:text="'¥' + ${item.price}">价格</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Reviews Section -->
            <div class="col-md-7 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-chat-dots"></i> 用户点评</h5>
                        <span class="badge bg-light text-success" th:text="${shop.reviewCount} + ' 条'">0</span>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-4">
                            <i class="bi bi-chat-square-text display-4 text-muted"></i>
                            <p class="text-muted mt-2">暂无点评，来做第一个点评的人吧！</p>
                            <a sec:authorize="isAuthenticated()" th:href="@{/review/new(shopId=${shop.id})}" class="btn btn-success">写点评</a>
                            <a sec:authorize="!isAuthenticated()" href="/login" class="btn btn-outline-success">登录后点评</a>
                        </div>
                        <div th:unless="${#lists.isEmpty(reviews)}">
                            <div class="review-item border-bottom pb-3 mb-3" th:each="review : ${reviews}">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <strong th:text="${review.user.nickname}">用户</strong>
                                        <span class="ms-2">
                                            <span th:each="i : ${#numbers.sequence(1, review.rating)}" class="text-warning"><i class="bi bi-star-fill"></i></span>
                                            <th:block th:each="i : ${#numbers.sequence(1, 5)}"><span th:if="${i > review.rating}" class="text-muted"><i class="bi bi-star"></i></span></th:block>
                                        </span>
                                    </div>
                                    <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}">日期</small>
                                </div>
                                <p class="mt-2 mb-1" th:text="${review.content}">点评内容</p>
                                <img th:if="${review.image != null}" th:src="${review.image}" class="img-fluid rounded mt-2" style="max-height:200px;" alt="点评图片">
                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <small>
                                        <span class="badge bg-secondary" th:text="${review.status}">状态</span>
                                    </small>
                                    <div>
                                        <button class="btn btn-sm"
                                                th:classappend="${currentUser != null and likedReviewIds.contains(review.id)} ? 'btn-outline-danger' : 'btn-outline-secondary'"
                                                th:onclick="'toggleLike(this, ' + ${review.id} + ')'">
                                            <i class="bi bi-hand-thumbs-up"></i> <span th:text="${review.likeCount}">0</span>
                                        </button>
                                        <button sec:authorize="isAuthenticated()"
                                                class="btn btn-sm btn-outline-danger"
                                                th:onclick="'deleteReview(' + ${review.id} + ')'"
                                                th:if="${currentUser != null and (currentUser.id == review.user.id or #strings.contains(#authentication.principal.authorities, 'ROLE_ADMIN'))}">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Review Pagination -->
                            <nav th:if="${totalPages > 1}">
                                <ul class="pagination pagination-sm justify-content-center mb-0">
                                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                        <a class="page-link" th:href="@{/shops/{id}(id=${shop.id}, page=${currentPage - 1})}">上一页</a>
                                    </li>
                                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                        th:classappend="${i == currentPage} ? 'active'">
                                        <a class="page-link" th:href="@{/shops/{id}(id=${shop.id}, page=${i})}" th:text="${i + 1}">1</a>
                                    </li>
                                    <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                                        <a class="page-link" th:href="@{/shops/{id}(id=${shop.id}, page=${currentPage + 1})}">下一页</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1"><i class="bi bi-shop"></i> 校园美食汇</p>
            <p class="mb-0 small text-muted">发现校园美食，分享舌尖体验</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
