<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑资料 - 校园美食汇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shop"></i> 校园美食汇</a>
            <a href="/user/profile" class="btn btn-outline-light btn-sm">返回个人中心</a>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0"><i class="bi bi-pencil"></i> 编辑个人资料</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/user/profile/update}" method="post" th:object="${profileUpdate}">
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-emoji-smile"></i> 昵称</label>
                                <input type="text" th:field="*{nickname}" class="form-control" placeholder="输入新的显示昵称" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="/user/profile" class="btn btn-secondary">取消</a>
                                <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> 保存修改</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
