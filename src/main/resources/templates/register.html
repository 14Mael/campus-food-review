<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 校园美食汇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <a href="/" class="text-decoration-none">
                        <h1 class="text-success"><i class="bi bi-shop"></i> 校园美食汇</h1>
                    </a>
                </div>
                <div class="card shadow">
                    <div class="card-header bg-success text-white text-center py-3">
                        <h4 class="mb-0"><i class="bi bi-person-plus"></i> 用户注册</h4>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <form th:action="@{/register}" method="post" th:object="${registerRequest}">
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-person"></i> 用户名</label>
                                <input type="text" th:field="*{username}" class="form-control form-control-lg" placeholder="3-20个字符" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-lock"></i> 密码</label>
                                <input type="password" th:field="*{password}" class="form-control form-control-lg" placeholder="4-20个字符" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-emoji-smile"></i> 昵称（选填）</label>
                                <input type="text" th:field="*{nickname}" class="form-control form-control-lg" placeholder="你的显示名称">
                            </div>
                            <button type="submit" class="btn btn-success w-100 btn-lg">注册</button>
                        </form>
                        <div class="text-center mt-3">
                            <span class="text-muted">已有账号？</span>
                            <a href="/login" class="text-success">立即登录</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
