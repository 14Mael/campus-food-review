<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论审核 - 校园美食汇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/admin"><i class="bi bi-gear"></i> 管理后台</a>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm me-2">前台首页</a>
                <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <div class="row">
            <div class="col-md-2 mb-4">
                <div class="list-group shadow-sm">
                    <a href="/admin" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2"></i> 控制台</a>
                    <a href="/admin/shops" class="list-group-item list-group-item-action"><i class="bi bi-shop"></i> 店铺管理</a>
                    <a href="/admin/reviews" class="list-group-item list-group-item-action active"><i class="bi bi-chat-dots"></i> 评论审核</a>
                    <a href="/admin/users" class="list-group-item list-group-item-action"><i class="bi bi-people"></i> 用户管理</a>
                </div>
            </div>
            <div class="col-md-10">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white d-flex justify-content-between">
                        <h5 class="mb-0"><i class="bi bi-chat-dots"></i> 评论审核</h5>
                        <div>
                            <a th:href="@{/admin/reviews(status='PENDING')}" class="btn btn-warning btn-sm" th:classappend="${currentStatus.name() == 'PENDING'} ? 'active' : ''">待审核</a>
                            <a th:href="@{/admin/reviews(status='APPROVED')}" class="btn btn-success btn-sm" th:classappend="${currentStatus.name() == 'APPROVED'} ? 'active' : ''">已通过</a>
                            <a th:href="@{/admin/reviews(status='REJECTED')}" class="btn btn-danger btn-sm" th:classappend="${currentStatus.name() == 'REJECTED'} ? 'active' : ''">已驳回</a>
                        </div>
                    </div>
                    <div class="card-body">
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-4">
                            <i class="bi bi-inbox display-3 text-muted"></i>
                            <p class="text-muted mt-2">暂无评论</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(reviews)}">
                            <div class="review-item border-bottom pb-3 mb-3" th:each="review : ${reviews}">
                                <div class="row">
                                    <div class="col-md-9">
                                        <div class="d-flex justify-content-between">
                                            <div>
                                                <strong th:text="${review.user.nickname}">用户名</strong>
                                                <span class="text-muted ms-2">@<span th:text="${review.user.username}">用户名</span></span>
                                                <span class="ms-2">→</span>
                                                <a th:href="@{/shops/{id}(id=${review.shop.id})}" class="text-success text-decoration-none" th:text="${review.shop.name}">店铺名</a>
                                            </div>
                                            <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">时间</small>
                                        </div>
                                        <div class="my-1">
                                            <span th:each="i : ${#numbers.sequence(1, review.rating)}" class="text-warning"><i class="bi bi-star-fill"></i></span>
                                            <th:block th:each="i : ${#numbers.sequence(1, 5)}"><span th:if="${i > review.rating}" class="text-muted"><i class="bi bi-star"></i></span></th:block>
                                            <span class="ms-2 badge"
                                                  th:classappend="${review.status.name() == 'APPROVED'} ? 'bg-success' : (${review.status.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-danger')"
                                                  th:text="${review.status}">状态</span>
                                        </div>
                                        <p th:text="${review.content}">内容</p>
                                        <img th:if="${review.image != null}" th:src="${review.image}" class="img-fluid rounded" style="max-height:150px;">
                                        <div class="mt-1">
                                            <small class="text-muted"><i class="bi bi-hand-thumbs-up"></i> <span th:text="${review.likeCount}">0</span></small>
                                        </div>
                                    </div>
                                    <div class="col-md-3 text-end">
                                        <div class="btn-group-vertical">
                                            <a th:href="@{/admin/reviews/approve/{id}(id=${review.id})}" 
                                               th:if="${review.status.name() != 'APPROVED'}"
                                               class="btn btn-sm btn-success"><i class="bi bi-check-lg"></i> 通过</a>
                                            <a th:href="@{/admin/reviews/reject/{id}(id=${review.id})}" 
                                               th:if="${review.status.name() == 'PENDING'}"
                                               class="btn btn-sm btn-warning"><i class="bi bi-x-lg"></i> 驳回</a>
                                            <a th:href="@{/admin/reviews/delete/{id}(id=${review.id})}" 
                                               class="btn btn-sm btn-danger"
                                               onclick="return confirm('确定删除此点评？')"><i class="bi bi-trash"></i> 删除</a>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Pagination -->
                            <nav th:if="${totalPages > 1}">
                                <ul class="pagination justify-content-center">
                                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/reviews(page=${currentPage - 1}, status=${currentStatus})}">上一页</a>
                                    </li>
                                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                        th:classappend="${i == currentPage} ? 'active'">
                                        <a class="page-link" th:href="@{/admin/reviews(page=${i}, status=${currentStatus})}" th:text="${i + 1}">1</a>
                                    </li>
                                    <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/reviews(page=${currentPage + 1}, status=${currentStatus})}">下一页</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
