<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${shop.id != null} ? '编辑店铺' : '添加店铺'">店铺表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin"><i class="bi bi-gear"></i> 管理后台</a>
            <a href="/admin/shops" class="btn btn-outline-light btn-sm">返回店铺列表</a>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0" th:text="${shop.id != null} ? '编辑店铺' : '添加店铺'">添加店铺</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/shops/save}" method="post" enctype="multipart/form-data">
                            <input type="hidden" name="id" th:value="${shop.id}">
                            <div class="mb-3">
                                <label class="form-label">店铺名称</label>
                                <input type="text" name="name" class="form-control" th:value="${shop.name}" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">位置</label>
                                    <input type="text" name="location" class="form-control" th:value="${shop.location}" placeholder="如：第一食堂二楼">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">分类</label>
                                    <select name="category" class="form-select">
                                        <option value="中餐" th:selected="${shop.category == '中餐'}">中餐</option>
                                        <option value="西餐" th:selected="${shop.category == '西餐'}">西餐</option>
                                        <option value="小吃" th:selected="${shop.category == '小吃'}">小吃</option>
                                        <option value="饮品" th:selected="${shop.category == '饮品'}">饮品</option>
                                        <option value="快餐" th:selected="${shop.category == '快餐'}">快餐</option>
                                        <option value="甜品" th:selected="${shop.category == '甜品'}">甜品</option>
                                        <option value="其他" th:selected="${shop.category == '其他'}">其他</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">描述</label>
                                <textarea name="description" class="form-control" rows="3" th:text="${shop.description}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">店铺图片</label>
                                <input type="file" name="imageFile" class="form-control" accept="image/*">
                                <div class="mt-2" th:if="${shop.image != null}">
                                    <img th:src="${shop.image}" class="img-thumbnail" style="max-height:100px;">
                                    <small class="text-muted ms-2">当前图片</small>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="/admin/shops" class="btn btn-secondary">取消</a>
                                <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> 保存</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
