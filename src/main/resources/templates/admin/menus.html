<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单管理 - 校园美食汇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin"><i class="bi bi-gear"></i> 管理后台</a>
            <a href="/admin/shops" class="btn btn-outline-light btn-sm">返回店铺列表</a>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-dark text-white d-flex justify-content-between">
                        <h5 class="mb-0"><i class="bi bi-menu-app"></i> <span th:text="${shop.name}">店铺名</span> - 菜品管理</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <!-- Add New Menu Item -->
                        <form th:action="@{/admin/menus/save}" method="post" class="row g-2 mb-4 p-3 bg-light rounded">
                            <input type="hidden" name="shopId" th:value="${shop.id}">
                            <div class="col-md-3">
                                <input type="text" name="name" class="form-control" placeholder="菜品名称" required>
                            </div>
                            <div class="col-md-2">
                                <input type="number" name="price" class="form-control" placeholder="价格" step="0.01" required>
                            </div>
                            <div class="col-md-3">
                                <input type="text" name="description" class="form-control" placeholder="描述（选填）">
                            </div>
                            <div class="col-md-2">
                                <input type="number" name="sortOrder" class="form-control" placeholder="排序" value="0">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success w-100"><i class="bi bi-plus"></i> 添加</button>
                            </div>
                        </form>

                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>排序</th>
                                    <th>名称</th>
                                    <th>描述</th>
                                    <th>价格</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${menuItems}">
                                    <td th:text="${item.sortOrder}">0</td>
                                    <td><strong th:text="${item.name}">菜品名</strong></td>
                                    <td class="text-muted small" th:text="${item.description}">描述</td>
                                    <td><span class="badge bg-success" th:text="'¥' + ${item.price}">价格</span></td>
                                    <td>
                                        <a th:href="@{/admin/menus/delete/{id}(id=${item.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除？')"><i class="bi bi-trash"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
