<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 校园美食汇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/admin"><i class="bi bi-gear"></i> 管理后台</a>
            <div class="collapse navbar-collapse show">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 返回前台</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="/logout"><i class="bi bi-box-arrow-right"></i> 退出</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 mb-4">
                <div class="list-group shadow-sm">
                    <a href="/admin" class="list-group-item list-group-item-action active">
                        <i class="bi bi-speedometer2"></i> 控制台
                    </a>
                    <a href="/admin/shops" class="list-group-item list-group-item-action">
                        <i class="bi bi-shop"></i> 店铺管理
                    </a>
                    <a href="/admin/reviews" class="list-group-item list-group-item-action">
                        <i class="bi bi-chat-dots"></i> 评论审核
                        <span class="badge bg-warning text-dark float-end" th:text="${pendingCount}">0</span>
                    </a>
                    <a href="/admin/users" class="list-group-item list-group-item-action">
                        <i class="bi bi-people"></i> 用户管理
                    </a>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-10">
                <!-- Stats Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card bg-success text-white shadow">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <h6 class="card-title">待审核点评</h6>
                                        <h2 class="mb-0" th:text="${pendingCount}">0</h2>
                                    </div>
                                    <i class="bi bi-clock-history display-4 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-info text-white shadow">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <h6 class="card-title">已通过点评</h6>
                                        <h2 class="mb-0" th:text="${approvedCount}">0</h2>
                                    </div>
                                    <i class="bi bi-check-circle display-4 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-warning text-dark shadow">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <h6 class="card-title">店铺总数</h6>
                                        <h2 class="mb-0" th:text="${shopCount}">0</h2>
                                    </div>
                                    <i class="bi bi-shop display-4 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-danger text-white shadow">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <h6 class="card-title">高分店铺</h6>
                                        <h2 class="mb-0" th:text="${#lists.size(topShops)}">0</h2>
                                    </div>
                                    <i class="bi bi-star display-4 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Top Shops -->
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0"><i class="bi bi-trophy"></i> 高分店铺排行</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>店铺名</th>
                                    <th>分类</th>
                                    <th>评分</th>
                                    <th>点评数</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="shop, iter : ${topShops}">
                                    <td th:text="${iter.index + 1}">1</td>
                                    <td><a th:href="@{/shops/{id}(id=${shop.id})}" class="text-decoration-none" th:text="${shop.name}">店铺名</a></td>
                                    <td><span class="badge bg-success" th:text="${shop.category}">分类</span></td>
                                    <td><span class="badge bg-warning text-dark"><i class="bi bi-star-fill"></i> <span th:text="${shop.avgRating}">0.0</span></span></td>
                                    <td th:text="${shop.reviewCount}">0</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
